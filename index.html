<!doctype html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sofa Bed Viewer</title>

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: linear-gradient(to bottom, #ffffff, #f3f3f3);
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .container {
      position: relative;
      width: 100%;
      height: 100vh;
    }

    model-viewer {
      width: 100%;
      height: 100%;
      background: transparent;
    }

    /* Title (Apple style) */
    .title {
      position: absolute;
      top: 60px;
      left: 60px;
      font-size: 42px;
      font-weight: 600;
      color: #111;
      letter-spacing: -1px;
    }

    .subtitle {
      position: absolute;
      top: 110px;
      left: 60px;
      font-size: 18px;
      color: #666;
    }

    /* Soft ground shadow enhancement */
    .fake-shadow {
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      width: 60%;
      height: 80px;
      background: radial-gradient(ellipse at center, rgba(0,0,0,0.15), transparent 70%);
      filter: blur(50px);
      pointer-events: none;
    }

  </style>

</head>

<body>

<div class="container">

  <div class="title">Convertible Sofa</div>
  <div class="subtitle">Realtime 3D Product View</div>

<model-viewer
src="./SofaBed.glb"

```
camera-controls
auto-rotate
auto-rotate-delay="0"
rotation-per-second="6deg"

interaction-prompt="none"

environment-image="neutral"
exposure="0.85"

shadow-intensity="2"
shadow-softness="0.25"

camera-orbit="45deg 75deg 3m"
field-of-view="30deg">
```

  </model-viewer>

  <div class="fake-shadow"></div>

</div>

</body>
</html>

  </model-viewer>
</body>
</html>
